name: Daily Beryl Scraper

on:
  schedule:
  - cron: '0 1 * * *'  # Runs at 01:00 UTC every day
workflow_dispatch:      # Allows you to run it manually for testing
  
  jobs:
  autoscrape:
  runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v3
- uses: r-lib/actions/setup-r@v2
- name: Install dependencies
run: |
  Rscript -e 'install.packages(c("tidyverse", "gbfs"))'
- name: Run Scraper
run: Rscript daily_scraper.R
- name: Commit files
run: |
  git config --local user.email "actions@github.com"
git config --local user.name "GitHub Actions"
git add data/beryl_history.csv
git commit -m "Daily data update: $(date)" || echo "No changes to commit"
git push